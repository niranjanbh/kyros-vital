{% extends "base.html" %}
{% block content %}
<h1>{{ title }}</h1>

{% if error %}
<div class="alert alert-error">{{ error }}</div>
{% endif %}

<div class="confirm-box">
  <p><strong>{{ action_label }}</strong></p>
  <p style="margin-top:10px;color:var(--secondary);">{{ action_description }}</p>

  <p style="margin-top:20px;font-size:0.875rem;">
    Type <span class="phrase">{{ confirmation_phrase }}</span> to confirm.
  </p>

  <form method="post" action="{{ submit_url }}" style="margin-top:16px;">
    <div class="form-group">
      <label for="confirmation">Confirmation phrase</label>
      <input
        type="text"
        id="confirmation"
        name="confirmation"
        autocomplete="off"
        placeholder="{{ confirmation_phrase }}"
        required
      >
    </div>
    <div style="display:flex;gap:10px;margin-top:8px;">
      <button type="submit" class="btn btn-danger">Confirm</button>
      <a href="{{ cancel_url }}" class="btn">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
