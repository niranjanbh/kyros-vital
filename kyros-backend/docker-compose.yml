version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: Kyros
      POSTGRES_PASSWORD: kyros
      POSTGRES_DB: kyros
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kyros"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      target: builder
    command: >
      poetry run uvicorn app.main:app
      --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
      - /app/.venv
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://kyros:kyros@postgres:5432/kyros
      REDIS_URL: redis://redis:6379/0
      STORAGE_DIR: /app/storage
      STORAGE_BACKEND: local
      SIGNING_SECRET: dev-signing-secret
      LOG_LEVEL: INFO
      ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
