services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kyros
      POSTGRES_PASSWORD: kyros
      POSTGRES_DB: kyros
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kyros"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    # No host port exposure — only reachable from the api container
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      target: runtime          # non-root user; .venv baked in at /app/.venv
    command: >
      /app/.venv/bin/uvicorn app.main:app
      --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app                 # live-reload: host code mounted into container
      - /app/.venv             # anonymous volume: keeps the baked .venv intact
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://kyros:kyros@postgres:5432/kyros
      REDIS_URL: redis://redis:6379/0
      STORAGE_DIR: /app/storage
      STORAGE_BACKEND: local
      SIGNING_SECRET: dev-signing-secret-change-before-production
      LOG_LEVEL: INFO
      ENV: development
      ALLOWED_ORIGINS: "*"
      ADMIN_USERNAME: Niranjan@kyros
      ADMIN_PASSWORD_HASH: "$2b$12$1ax1Ihpbcdu/HGIQb4GUSOPI8ekwrfcN9.aSXmuswKpXnjgvBhqze"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
