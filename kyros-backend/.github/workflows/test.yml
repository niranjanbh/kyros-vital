name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kyros
          POSTGRES_PASSWORD: kyros
          POSTGRES_DB: kyros_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry==1.8.5

      - name: Install dependencies
        run: poetry install

      - name: Lint (ruff)
        run: poetry run ruff check . && poetry run ruff format --check .

      - name: Type check (mypy)
        run: poetry run mypy app/

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://kyros:kyros@localhost:5432/kyros_test
          REDIS_URL: redis://localhost:6379/0
          STORAGE_DIR: /tmp/kyros-test-storage
          STORAGE_BACKEND: local
          SIGNING_SECRET: test-signing-secret
          LOG_LEVEL: WARNING
          ENV: test
        run: poetry run pytest --cov=app --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
        continue-on-error: true
